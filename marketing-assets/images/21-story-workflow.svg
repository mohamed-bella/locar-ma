<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-label="Workflow Rentiq">
  <rect width="1080" height="1920" fill="#E9EDF2"/>
  <rect x="56" y="56" width="968" height="1808" rx="44" fill="#fff"/>
  <circle cx="150" cy="146" r="48" fill="#003B95"/>
  <image href="../rentiq-logo.png" x="110" y="106" width="80" height="80"/>
  <text x="224" y="142" font-family="Arial, sans-serif" font-size="46" font-weight="900" fill="#172033">Le flux complet Rentiq</text>
  <text x="224" y="190" font-family="Arial, sans-serif" font-size="29" fill="#5F6B7A">De la réservation au suivi véhicule</text>
  <circle cx="170" cy="330" r="54" fill="#0071C2"/><text x="170" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#fff">1</text><path d="M170 392v158" stroke="#D3DAE3" stroke-width="8" stroke-linecap="round"/><text x="260" y="322" font-family="Arial, sans-serif" font-size="43" font-weight="900" fill="#172033">Réserver</text><text x="260" y="372" font-family="Arial, sans-serif" font-size="30" fill="#5F6B7A">Choisir client, voiture, dates et montant.</text>
  <circle cx="170" cy="615" r="54" fill="#008A45"/><text x="170" y="628" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#fff">2</text><path d="M170 677v158" stroke="#D3DAE3" stroke-width="8" stroke-linecap="round"/><text x="260" y="607" font-family="Arial, sans-serif" font-size="43" font-weight="900" fill="#172033">Notifier</text><text x="260" y="657" font-family="Arial, sans-serif" font-size="30" fill="#5F6B7A">WhatsApp informe le propriétaire automatiquement.</text>
  <circle cx="170" cy="900" r="54" fill="#071B3D"/><text x="170" y="913" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#fff">3</text><path d="M170 962v158" stroke="#D3DAE3" stroke-width="8" stroke-linecap="round"/><text x="260" y="892" font-family="Arial, sans-serif" font-size="43" font-weight="900" fill="#172033">Contracter</text><text x="260" y="942" font-family="Arial, sans-serif" font-size="30" fill="#5F6B7A">Créer le contrat, générer le PDF et partager le lien.</text>
  <circle cx="170" cy="1185" r="54" fill="#FFB700"/><text x="170" y="1198" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#fff">4</text><path d="M170 1247v158" stroke="#D3DAE3" stroke-width="8" stroke-linecap="round"/><text x="260" y="1177" font-family="Arial, sans-serif" font-size="43" font-weight="900" fill="#172033">Signer</text><text x="260" y="1227" font-family="Arial, sans-serif" font-size="30" fill="#5F6B7A">Le client signe depuis son téléphone.</text>
  <circle cx="170" cy="1470" r="54" fill="#D4112F"/><text x="170" y="1483" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#fff">5</text><text x="260" y="1462" font-family="Arial, sans-serif" font-size="43" font-weight="900" fill="#172033">Suivre</text><text x="260" y="1512" font-family="Arial, sans-serif" font-size="30" fill="#5F6B7A">Retour, entretien, dépenses et documents restent à jour.</text>
  <rect x="112" y="1740" width="856" height="70" rx="18" fill="#003B95"/>
  <text x="540" y="1786" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#fff">Rentiq garde chaque étape connectée</text>
</svg>